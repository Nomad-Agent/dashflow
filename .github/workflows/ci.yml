name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      specs: ${{ steps.filter.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'
            specs:
              - 'doc/specs/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.specs == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d dashflow_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@localhost:5432/dashflow_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Lint and test
        working-directory: backend
        run: |
          uv sync --all-extras
          uv run ruff check app tests
          uv run alembic upgrade head
          uv run pytest -q
      - name: Docker build API
        run: docker build -f Dockerfile -t dashflow-api:ci .

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.specs == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint and build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: |
          npm ci
          npm run test:ci
          npm run lint
          npm run build

  contract:
    needs: changes
    if: needs.changes.outputs.specs == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate OpenAPI structure
        run: npx @redocly/cli@latest lint doc/specs/openapi.yaml
      - name: Ensure generated frontend API types are in sync
        working-directory: frontend
        run: |
          npm ci
          npm run check:types-generated
