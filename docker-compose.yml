# Local API against Neon: set DATABASE_URL in backend/.env (postgresql+asyncpg://...)
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      PORT: "8000"
